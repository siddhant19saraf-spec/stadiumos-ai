groups:
  - name: stadiumos-api
    interval: 30s
    rules:
      - alert: APIHighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) /
          rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "High API error rate ({{ $value | humanizePercentage }})"
          description: >
            API error rate is {{ $value | humanizePercentage }} for the last 5 minutes.
            Threshold: > 5%

      - alert: APISlowResponses
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 3m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "API p95 latency exceeds 1s ({{ $value | humanizeDuration }})"
          description: >
            p95 API latency is {{ $value | humanizeDuration }}.
            Threshold: > 1s

      - alert: APIHighTraffic
        expr: |
          rate(http_requests_total[1m]) > 1000
        for: 1m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High API traffic spike"
          description: >
            API is receiving {{ $value | humanize }} requests/sec.

  - name: stadiumos-ai
    interval: 30s
    rules:
      - alert: AISlowResponse
        expr: |
          histogram_quantile(0.95, rate(ai_response_duration_seconds_bucket[5m])) > 5.0
        for: 2m
        labels:
          severity: warning
          team: ai
        annotations:
          summary: "AI p95 response time > 5s ({{ $value | humanizeDuration }})"
          description: >
            AI provider p95 response time is {{ $value | humanizeDuration }}.
            Threshold: > 5s

      - alert: AIProviderFailure
        expr: |
          rate(ai_provider_errors_total[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
          team: ai
        annotations:
          summary: "AI provider error rate elevated"
          description: >
            AI provider errors at {{ $value | humanize }}/sec.
            Check provider API keys and rate limits.

      - alert: AIProviderFailover
        expr: |
          ai_provider_active{provider="fallback"} == 1
        for: 2m
        labels:
          severity: warning
          team: ai
        annotations:
          summary: "AI provider failover active"
          description: >
            Primary AI provider is down. System is using fallback provider.

  - name: stadiumos-infrastructure
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: >
            {{ $labels.service }} has been unreachable for 30 seconds.
            Environment: {{ $labels.environment }}

      - alert: HighMemoryUsage
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) /
          node_memory_MemTotal_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage ({{ $value | humanizePercentage }})"
          description: >
            Memory usage is {{ $value | humanizePercentage }}.
            Threshold: > 85%

      - alert: HighCPUUsage
        expr: |
          rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage ({{ $value | humanizePercentage }})"
          description: >
            CPU usage is {{ $value | humanizePercentage }}.
            Threshold: > 80%

  - name: stadiumos-database
    interval: 30s
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          pg_stat_database_numbackends / pg_settings_max_connections > 0.8
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: >
            {{ $value | humanizePercentage }} of database connections in use.

      - alert: DatabaseSlowQueries
        expr: |
          rate(pg_stat_activity_max_tx_duration_seconds[1m]) > 10
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Database slow queries detected"
          description: >
            Queries taking > 10s detected. Check query performance.

  - name: stadiumos-auth
    interval: 30s
    rules:
      - alert: AuthFailureRate
        expr: |
          rate(auth_login_failures_total[5m]) > 0.5
        for: 2m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "Elevated authentication failures"
          description: >
            {{ $value | humanize }} login failures/sec. Possible brute force attack.

      - alert: TokenRefreshFailures
        expr: |
          rate(auth_token_refresh_failures_total[5m]) > 0.2
        for: 2m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "Elevated token refresh failures"
          description: >
            {{ $value | humanize }} token refresh failures/sec.

  - name: stadiumos-queue
    interval: 30s
    rules:
      - alert: QueueBacklog
        expr: |
          arq_queue_size > 1000
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Background job queue backlog"
          description: >
            {{ $value | humanize }} jobs pending in queue.
            Consider scaling worker instances.

      - alert: QueueJobFailure
        expr: |
          rate(arq_job_failures_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "High background job failure rate"
          description: >
            {{ $value | humanize }} job failures/sec.

  - name: stadiumos-deployment
    interval: 60s
    rules:
      - alert: DeploymentFailed
        expr: |
          deployment_status == 0
        for: 0s
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Deployment failed"
          description: >
            Latest deployment for {{ $labels.service }} failed.
            Check CI/CD pipeline.

      - alert: RollbackInProgress
        expr: |
          deployment_rollback_active == 1
        for: 0s
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Rollback in progress"
          description: >
            Rollback triggered for {{ $labels.service }}.
            Monitor incident response.
