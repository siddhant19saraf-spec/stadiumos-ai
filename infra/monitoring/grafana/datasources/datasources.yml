apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "30s"

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: "trace_id"
          matcherRegex: "trace.id[=:]\s*([\\w-]+)"
          url: "$${__value.raw}"
          urlDisplayLabel: "View Trace in Tempo"
        - name: "correlation_id"
          matcherRegex: "correlation.id[=:]\s*([\\w-]+)"

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: true
        spanEndTimeShift: "5m"
        spanStartTimeShift: "-5m"
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
