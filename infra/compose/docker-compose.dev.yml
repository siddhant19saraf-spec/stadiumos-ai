# ═══════════════════════════════════════════════════
# StadiumOS AI — Development Override
# ═══════════════════════════════════════════════════

services:
  frontend:
    build:
      target: development
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=1
    ports:
      - "3000:3000"

  backend:
    build:
      target: development
    volumes:
      - ../../backend:/app
    environment:
      - NODE_ENV=development
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - DEBUG=true
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--log-level", "debug"]

  worker:
    build:
      target: development
    volumes:
      - ../../backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - worker
