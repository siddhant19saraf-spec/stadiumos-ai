apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: stadiumos
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: stadiumos
      component: frontend
  template:
    metadata:
      labels:
        app: stadiumos
        component: frontend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: ghcr.io/stadiumos/frontend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: stadiumos-config
            - secretRef:
                name: stadiumos-secrets
          env:
            - name: DOCKER_BUILD
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
