name: Release Management

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.3)"
        required: true
      type:
        description: "Release type"
        required: true
        default: "standard"
        type: choice
        options:
          - standard
          - hotfix
          - prerelease

jobs:

  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Releasing version: v$VERSION"

          FRONTEND_VER=$(node -e "console.log(require('./frontend/package.json').version)")
          if [ "$VERSION" != "$FRONTEND_VER" ]; then
            echo "⚠️ Tag version ($VERSION) != frontend version ($FRONTEND_VER)"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check CHANGELOG
        run: |
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "⚠️ Version $VERSION not found in CHANGELOG.md"
          fi

  docker-build-release:
    name: Build Release Images
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: infra/docker/frontend/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: infra/docker/backend/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  github-release:
    name: Create GitHub Release
    needs: [validate, docker-build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        run: |
          if [ -f CHANGELOG.md ]; then
            VERSION="${{ env.VERSION }}"
            NOTES=$(awk '/^## \['"$VERSION"'\]/,/^## \[/' CHANGELOG.md | head -n -1)
            echo "NOTES<<EOF" >> $GITHUB_ENV
            echo "$NOTES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "Release v${{ env.VERSION }}"
          body: ${{ env.NOTES }}
          draft: false
          prerelease: ${{ github.event.inputs.type == 'prerelease' }}
          generate_release_notes: true

  hotfix:
    name: Hotfix Release
    if: ${{ github.event.inputs.type == 'hotfix' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create hotfix branch
        run: |
          git config user.name "StadiumOS AI Bot"
          git config user.email "bot@stadiumos.ai"
          HOTFIX_BRANCH="hotfix/v${{ env.VERSION }}"
          git checkout -b $HOTFIX_BRANCH
          git push origin $HOTFIX_BRANCH

      - name: Merge hotfix to main
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff $HOTFIX_BRANCH -m "Merge hotfix v${{ env.VERSION }}"
          git push origin main

      - name: Merge hotfix to develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge --no-ff $HOTFIX_BRANCH -m "Merge hotfix v${{ env.VERSION }} into develop"
          git push origin develop
